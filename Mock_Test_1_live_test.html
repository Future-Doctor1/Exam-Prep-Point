<style>

  .timer-label{font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-soft);}
  #timer{font-size:28px; font-weight:600; border:2px solid var(--ink); border-radius:6px; padding:2px 12px; background:var(--card);}
  #timer.low{color:var(--coral); border-color:var(--coral);}

  .layout{display:grid; grid-template-columns:1fr 260px; gap:20px;}

  .qnum{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft);}
  .qtext{font-size:17px; line-height:1.5; margin:0 0 16px; font-weight:500; white-space:pre-line;}

    border-radius:50%; width:21px; height:21px; display:flex; align-items:center; justify-content:center; font-size:11.5px; flex-shrink:0;}

  .opt.selected{border-color:var(--coral); background:#FBECE8;}
  .opt.selected .tag{background:var(--coral); border-color:var(--coral); color:#fff;}
  .opt.correct{border-color:var(--forest); background:#EAF1EB;}
  .opt.correct .tag{background:var(--forest); border-color:var(--forest); color:#fff;}
  .opt.incorrect{border-color:var(--coral); background:#FBECE8;}
  .opt.incorrect .tag{background:var(--coral); border-color:var(--coral); color:#fff;}

  .diagram-wrap{display:flex; justify-content:center; margin:6px 0 14px; padding:8px;
    background:repeating-linear-gradient(#E4DCCC 0 1px, transparent 1px 20px),
               repeating-linear-gradient(90deg,#E4DCCC 0 1px, transparent 1px 20px);
    border:1px dashed #CFC4B0; border-radius:8px;}
  .diagram-wrap table{border-collapse:collapse; font-family:'IBM Plex Mono',monospace; font-size:13px; background:#fff;}
  .diagram-wrap th, .diagram-wrap td{border:1px solid var(--ink-soft); padding:6px 12px;}
  .diagram-wrap th{background:#EFE7D6;}
  .qfooter{display:flex; justify-content:space-between; margin-top:18px;}
  .navArrow{padding:9px 16px; border-radius:6px; border:1.4px solid var(--ink); background:transparent; color:var(--ink);

  .navArrow:disabled{opacity:.35; cursor:not-allowed;}
  .navArrow:disabled:hover{background:transparent; color:var(--ink);}

  .side{display:flex; flex-direction:column; gap:14px;}

  .subjectTab{font-family:'IBM Plex Mono',monospace; font-size:10.5px; padding:6px 8px; border-radius:5px; border:1.3px solid var(--ink-soft);

  .navBtn{aspect-ratio:1; border-radius:4px; border:1.2px solid var(--ink-soft); background:transparent; color:var(--ink-soft);
    font-family:'IBM Plex Mono',monospace; font-size:10px; cursor:pointer; display:flex; align-items:center; justify-content:center;}
  .navBtn.answered{background:var(--ink); color:var(--paper); border-color:var(--ink);}
  .navBtn.current{outline:2px solid var(--coral); outline-offset:1px;}
  #progressText{font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--ink-soft); text-align:center; margin:6px 0;}
  #submitBtn{width:100%; margin-top:4px; padding:11px; border:none; border-radius:6px; background:var(--coral); color:#fff;
    font-family:'IBM Plex Mono',monospace; font-weight:600; letter-spacing:.03em; font-size:13px; cursor:pointer;}
  #submitBtn:hover{background:#7f2f24;}

  #resultsScreen{display:none;}
  .score-hero{background:var(--card); border:1.5px solid var(--ink); border-radius:10px; padding:26px; display:flex; gap:26px;
    align-items:center; flex-wrap:wrap; box-shadow:3px 4px 0 var(--shadow); margin-bottom:20px;}
  .score-num{font-family:'Newsreader',serif; font-style:italic; font-weight:600; font-size:56px; line-height:1;}
  .score-sub{font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--ink-soft); margin-top:6px;}
  .breakdown{flex:1; min-width:260px;}
  .bd-row{display:flex; align-items:center; gap:10px; margin-bottom:7px; font-family:'IBM Plex Mono',monospace; font-size:12px;}
  .bd-label{width:150px; color:var(--ink-soft);}
  .bd-bar-bg{flex:1; height:8px; background:var(--paper-line); border-radius:4px; overflow:hidden;}
  .bd-bar{height:100%; background:var(--coral);}
  .bd-frac{width:50px; text-align:right;}
  #reviewToggle{display:block; margin:0 auto 20px; padding:10px 22px; border-radius:6px; border:1.4px solid var(--ink);
    background:var(--ink); color:var(--paper); font-family:'IBM Plex Mono',monospace; font-size:13px; cursor:pointer;}
  .review-item{background:var(--card); border:1.4px solid #D9CFC1; border-radius:8px; padding:14px 18px; margin-bottom:10px;}
  .review-item .qtext{font-size:14.5px; margin-bottom:8px;}

  footer.credit{text-align:center; font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft); margin-top:26px;}
</style>

const answers = new Array(TOTAL).fill(null);
let current = 0;
let timeLeft = 180*60;
let submitted = false;
let timerId = null;

/* ================= DOM refs ================= */
const qSection = document.getElementById('qSection');
const qNum = document.getElementById('qNum');
const qText = document.getElementById('qText');
const optionsList = document.getElementById('optionsList');
const diagramWrap = document.getElementById('diagramWrap');
const navGrid = document.getElementById('navGrid');
const progressText = document.getElementById('progressText');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const subjectTabsEl = document.getElementById('subjectTabs');

/* ================= Subject index map ================= */
const subjects = [];
questions.forEach((q,i) => {
  if(!subjects.find(s => s.name === q.s)) subjects.push({name:q.s, start:i});
});

function buildSubjectTabs(){
  subjectTabsEl.innerHTML = "";
  subjects.forEach(sub => {
    const b = document.createElement('button');
    b.className = 'subjectTab';
    b.textContent = sub.name;
    b.onclick = () => { current = sub.start; render(); };
    subjectTabsEl.appendChild(b);
  });
}

function updateSubjectTabs(){
  const curSubject = questions[current].s;
  document.querySelectorAll('.subjectTab').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === curSubject);
  });
}

/* ================= Nav grid ================= */
function buildNavGrid(){
  navGrid.innerHTML = "";
  questions.forEach((_, i) => {
    const b = document.createElement('button');
    b.className = 'navBtn';
    b.textContent = i+1;
    b.onclick = () => { current = i; render(); };
    navGrid.appendChild(b);
  });
}
function renderNavGrid(){
  const btns = navGrid.querySelectorAll('.navBtn');
  btns.forEach((b,i) => {
    b.classList.toggle('answered', answers[i] !== null);
    b.classList.toggle('current', i === current);
  });
  const answeredCount = answers.filter(a => a !== null).length;
  progressText.textContent = `${answeredCount} / ${TOTAL} answered`;
}

/* ================= Render question ================= */
function render(){
  const item = questions[current];
  qSection.textContent = item.s;
  qNum.textContent = `Question ${current+1} / ${TOTAL}`;
  qText.textContent = item.q;

  if(item.diagram){
    diagramWrap.style.display = 'flex';
    diagramWrap.innerHTML = diagramHTML(item.diagram);
  } else {
    diagramWrap.style.display = 'none';
    diagramWrap.innerHTML = '';
  }

  optionsList.innerHTML = "";
  item.o.forEach((optText,i) => {
    const div = document.createElement('div');
    div.className = 'opt' + (answers[current] === i ? ' selected' : '');
    div.innerHTML = `<span class="tag">${String.fromCharCode(65+i)}</span><span>${optText}</span>`;
    div.onclick = () => { answers[current] = i; render(); renderNavGrid(); };
    optionsList.appendChild(div);
  });

  prevBtn.disabled = current === 0;
  nextBtn.textContent = current === TOTAL-1 ? 'Finish →' : 'Next →';
  renderNavGrid();
  updateSubjectTabs();

  const curBtn = navGrid.children[current];
  if(curBtn) curBtn.scrollIntoView({block:'nearest'});
}

prevBtn.onclick = () => { if(current>0){ current--; render(); } };
nextBtn.onclick = () => { if(current<TOTAL-1){ current++; render(); } else { attemptSubmit(); } };

/* ================= Timer ================= */
const timerEl = document.getElementById('timer');
function formatTime(t){
  const m = Math.floor(t/60).toString().padStart(2,'0');
  const s = Math.floor(t%60).toString().padStart(2,'0');
  return `${m}:${s}`;
}
function tick(){
  if(submitted) return;
  timeLeft--;
  timerEl.textContent = formatTime(timeLeft);
  if(timeLeft <= 300) timerEl.classList.add('low');
  if(timeLeft <= 0){ clearInterval(timerId); finishTest(); }
}
timerId = setInterval(tick, 1000);
timerEl.textContent = formatTime(timeLeft);

/* ================= Submit & results ================= */
document.getElementById('submitBtn').onclick = attemptSubmit;
function attemptSubmit(){
  const unanswered = answers.filter(a => a === null).length;
  if(unanswered > 0){
    const proceed = confirm(`You have ${unanswered} unanswered question(s). Submit anyway?`);
    if(!proceed) return;
  }
  finishTest();
}

function finishTest(){
  submitted = true;
  clearInterval(timerId);
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('resultsScreen').style.display = 'block';

  let score = 0;
  questions.forEach((item,i) => { if(answers[i] === item.a) score++; });

  document.getElementById('scoreNum').textContent = `${score}/${TOTAL}`;
  const pct = Math.round((score/TOTAL)*100);
  const usedSeconds = 180*60 - timeLeft;
  document.getElementById('scoreSub').textContent = `${pct}% correct · time used ${formatTime(usedSeconds)}`;

  const sections = {};
  questions.forEach((item,i) => {
    if(!sections[item.s]) sections[item.s] = {correct:0,total:0};
    sections[item.s].total++;
    if(answers[i] === item.a) sections[item.s].correct++;
  });
  const bd = document.getElementById('breakdown');
  bd.innerHTML = "";
  Object.keys(sections).forEach(key => {
    const {correct,total} = sections[key];
    const row = document.createElement('div');
    row.className = 'bd-row';
    row.innerHTML = `<div class="bd-label">${key}</div>
      <div class="bd-bar-bg"><div class="bd-bar" style="width:${(correct/total)*100}%"></div></div>
      <div class="bd-frac">${correct}/${total}</div>`;
    bd.appendChild(row);
  });

  buildReview();
}

function buildReview(){
  const list = document.getElementById('reviewList');
  list.innerHTML = "";
  questions.forEach((item,i) => {
    const div = document.createElement('div');
    div.className = 'review-item';
    let optsHtml = "";
    item.o.forEach((optText,j) => {
      let cls = '';
      if(j === item.a) cls = 'correct';
      else if(j === answers[i] && answers[i] !== item.a) cls = 'incorrect';
      optsHtml += `<div class="opt ${cls} disabled"><span class="tag">${String.fromCharCode(65+j)}</span><span>${optText}</span></div>`;
    });
    const diagHtml = item.diagram ? `<div class="diagram-wrap" style="display:flex;">${diagramHTML(item.diagram)}</div>` : '';
    div.innerHTML = `<div class="qsection">${item.s} · Q${i+1}</div>
      <p class="qtext">${item.q}</p>
      ${diagHtml}
      <div class="options">${optsHtml}</div>`;
    list.appendChild(div);
  });
}

document.getElementById('reviewToggle').onclick = function(){
  const list = document.getElementById('reviewList');
  const showing = list.style.display === 'block';
  list.style.display = showing ? 'none' : 'block';
  this.textContent = showing ? 'Show Answer Review' : 'Hide Answer Review';
};

/* ================= Init ================= */
buildSubjectTabs();
buildNavGrid();
render();
</script>
