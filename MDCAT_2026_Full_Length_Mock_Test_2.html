const TOTAL = questions.length;
const answers = new Array(TOTAL).fill(null);
let current = 0;
let timeLeft = 150*60;
let submitted = false;
let timerId = null;

/* ================= Diagrams ================= */
function diagramHTML(kind){
  if(kind === "restable"){
    return `<table>
      <tr><th></th><th>Cross-sectional area</th><th>Length</th></tr>
      <tr><td>Given wire</td><td>Half</td><td>No change</td></tr>
    </table>`;
  }
  if(kind === "pv"){
    return `<svg width="260" height="180" viewBox="0 0 260 180" xmlns="http://www.w3.org/2000/svg">
      <line x1="40" y1="150" x2="230" y2="150" stroke="#25201A" stroke-width="2"/>
      <line x1="40" y1="150" x2="40" y2="20" stroke="#25201A" stroke-width="2"/>
      <text x="235" y="155" font-family="IBM Plex Mono, monospace" font-size="12" fill="#25201A">V (m³)</text>
      <text x="6" y="20" font-family="IBM Plex Mono, monospace" font-size="12" fill="#25201A">p (Pa)</text>
      <line x1="90" y1="150" x2="90" y2="94" stroke="#6B6157" stroke-width="1" stroke-dasharray="2 3"/>
      <line x1="150" y1="150" x2="150" y2="38" stroke="#6B6157" stroke-width="1" stroke-dasharray="2 3"/>
      <text x="82" y="164" font-family="IBM Plex Mono, monospace" font-size="11" fill="#6B6157">0.3</text>
      <text x="142" y="164" font-family="IBM Plex Mono, monospace" font-size="11" fill="#6B6157">0.5</text>
      <text x="18" y="98" font-family="IBM Plex Mono, monospace" font-size="11" fill="#6B6157">8</text>
      <text x="14" y="42" font-family="IBM Plex Mono, monospace" font-size="11" fill="#6B6157">16</text>
      <line x1="90" y1="94" x2="150" y2="38" stroke="#9B3B2E" stroke-width="3"/>
      <circle cx="90" cy="94" r="3.5" fill="#9B3B2E"/>
      <circle cx="150" cy="38" r="3.5" fill="#9B3B2E"/>
      <text x="94" y="88" font-family="IBM Plex Mono, monospace" font-size="12" fill="#9B3B2E">A</text>
      <text x="154" y="34" font-family="IBM Plex Mono, monospace" font-size="12" fill="#9B3B2E">B</text>
    </svg>`;
  }
  return "";
}

/* ================= DOM refs ================= */
const qSection = document.getElementById('qSection');
const qNum = document.getElementById('qNum');
const qText = document.getElementById('qText');
const optionsList = document.getElementById('optionsList');
const diagramWrap = document.getElementById('diagramWrap');
const navGrid = document.getElementById('navGrid');
const progressText = document.getElementById('progressText');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const subjectTabsEl = document.getElementById('subjectTabs');

/* ================= Subject index map ================= */
const subjects = [];
questions.forEach((q,i) => {
  if(!subjects.find(s => s.name === q.s)) subjects.push({name:q.s, start:i});
});

function buildSubjectTabs(){
  subjectTabsEl.innerHTML = "";
  subjects.forEach(sub => {
    const b = document.createElement('button');
    b.className = 'subjectTab';
    b.textContent = sub.name;
    b.onclick = () => { current = sub.start; render(); };
    subjectTabsEl.appendChild(b);
  });
}

function updateSubjectTabs(){
  const curSubject = questions[current].s;
  document.querySelectorAll('.subjectTab').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === curSubject);
  });
}

/* ================= Nav grid ================= */
function buildNavGrid(){
  navGrid.innerHTML = "";
  questions.forEach((_, i) => {
    const b = document.createElement('button');
    b.className = 'navBtn';
    b.textContent = i+1;
    b.onclick = () => { current = i; render(); };
    navGrid.appendChild(b);
  });
}
function renderNavGrid(){
  const btns = navGrid.querySelectorAll('.navBtn');
  btns.forEach((b,i) => {
    b.classList.toggle('answered', answers[i] !== null);
    b.classList.toggle('current', i === current);
  });
  const answeredCount = answers.filter(a => a !== null).length;
  progressText.textContent = `${answeredCount} / ${TOTAL} answered`;
}

/* ================= Render question ================= */
function render(){
  const item = questions[current];
  qSection.textContent = item.s;
  qNum.textContent = `Question ${current+1} / ${TOTAL}`;
  qText.textContent = item.q;

  if(item.diagram){
    diagramWrap.style.display = 'flex';
    diagramWrap.innerHTML = diagramHTML(item.diagram);
  } else {
    diagramWrap.style.display = 'none';
    diagramWrap.innerHTML = '';
  }

  optionsList.innerHTML = "";
  item.o.forEach((optText,i) => {
    const div = document.createElement('div');
    div.className = 'opt' + (answers[current] === i ? ' selected' : '');
    div.innerHTML = `<span class="tag">${String.fromCharCode(65+i)}</span><span>${optText}</span>`;
    div.onclick = () => { answers[current] = i; render(); renderNavGrid(); };
    optionsList.appendChild(div);
  });

  prevBtn.disabled = current === 0;
  nextBtn.textContent = current === TOTAL-1 ? 'Finish →' : 'Next →';
  renderNavGrid();
  updateSubjectTabs();

  const curBtn = navGrid.children[current];
  if(curBtn) curBtn.scrollIntoView({block:'nearest'});
}

prevBtn.onclick = () => { if(current>0){ current--; render(); } };
nextBtn.onclick = () => { if(current<TOTAL-1){ current++; render(); } else { attemptSubmit(); } };

/* ================= Timer ================= */
const timerEl = document.getElementById('timer');
function formatTime(t){
  const m = Math.floor(t/60).toString().padStart(2,'0');
  const s = Math.floor(t%60).toString().padStart(2,'0');
  return `${m}:${s}`;
}
function tick(){
  if(submitted) return;
  timeLeft--;
  timerEl.textContent = formatTime(timeLeft);
  if(timeLeft <= 300) timerEl.classList.add('low');
  if(timeLeft <= 0){ clearInterval(timerId); finishTest(); }
}
timerId = setInterval(tick, 1000);
timerEl.textContent = formatTime(timeLeft);

/* ================= Submit & results ================= */
document.getElementById('submitBtn').onclick = attemptSubmit;
function attemptSubmit(){
  const unanswered = answers.filter(a => a === null).length;
  if(unanswered > 0){
    const proceed = confirm(`You have ${unanswered} unanswered question(s). Submit anyway?`);
    if(!proceed) return;
  }
  finishTest();
}

function finishTest(){
  submitted = true;
  clearInterval(timerId);
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('resultsScreen').style.display = 'block';

  let score = 0;
  questions.forEach((item,i) => { if(answers[i] === item.a) score++; });

  document.getElementById('scoreNum').textContent = `${score}/${TOTAL}`;
  const pct = Math.round((score/TOTAL)*100);
  const usedSeconds = 150*60 - timeLeft;
  document.getElementById('scoreSub').textContent = `${pct}% correct · time used ${formatTime(usedSeconds)}`;

  const sections = {};
  questions.forEach((item,i) => {
    if(!sections[item.s]) sections[item.s] = {correct:0,total:0};
    sections[item.s].total++;
    if(answers[i] === item.a) sections[item.s].correct++;
  });
  const bd = document.getElementById('breakdown');
  bd.innerHTML = "";
  Object.keys(sections).forEach(key => {
    const {correct,total} = sections[key];
    const row = document.createElement('div');
    row.className = 'bd-row';
    row.innerHTML = `<div class="bd-label">${key}</div>
      <div class="bd-bar-bg"><div class="bd-bar" style="width:${(correct/total)*100}%"></div></div>
      <div class="bd-frac">${correct}/${total}</div>`;
    bd.appendChild(row);
  });

  buildReview();
}

function buildReview(){
  const list = document.getElementById('reviewList');
  list.innerHTML = "";
  questions.forEach((item,i) => {
    const div = document.createElement('div');
    div.className = 'review-item';
    let optsHtml = "";
    item.o.forEach((optText,j) => {
      let cls = '';
      if(j === item.a) cls = 'correct';
      else if(j === answers[i] && answers[i] !== item.a) cls = 'incorrect';
      optsHtml += `<div class="opt ${cls} disabled"><span class="tag">${String.fromCharCode(65+j)}</span><span>${optText}</span></div>`;
    });
    const diagHtml = item.diagram ? `<div class="diagram-wrap" style="display:flex;">${diagramHTML(item.diagram)}</div>` : '';
    div.innerHTML = `<div class="qsection">${item.s} · Q${i+1}</div>
      <p class="qtext">${item.q}</p>
      ${diagHtml}
      <div class="options">${optsHtml}</div>`;
    list.appendChild(div);
  });
}

document.getElementById('reviewToggle').onclick = function(){
  const list = document.getElementById('reviewList');
  const showing = list.style.display === 'block';
  list.style.display = showing ? 'none' : 'block';
  this.textContent = showing ? 'Show Answer Review' : 'Hide Answer Review';
};

/* ================= Init ================= */
buildSubjectTabs();
buildNavGrid();
render();
</script>
